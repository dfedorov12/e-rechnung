<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verlauf | E-Rechnung Konverter | DIHAG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-guard">

<header class="site-header">
  <div class="site-logo">DIHAG <span>E-Rechnung</span></div>
  <nav class="site-nav">
    <a href="index.html">Konverter</a>
    <a href="verlauf.html" class="active">Verlauf</a>
    <a href="einstellungen.html" id="nav-einstellungen" style="display:none;">Einstellungen</a>
  </nav>
  <div class="auth-user">
    <div class="auth-avatar" id="auth-initials">…</div>
    <div class="auth-user-text">
      <span class="auth-user-name" id="auth-name"></span>
      <span class="auth-user-email" id="auth-email"></span>
    </div>
    <button class="btn-auth-logout" onclick="authLogout()">Abmelden</button>
  </div>
</header>

<div class="page-content">

  <div class="verlauf-header">
    <div>
      <h2>📂 Exportverlauf</h2>
      <p id="verlauf-subtitle">Rechnungen aus SharePoint werden geladen…</p>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <a href="index.html" class="btn btn-primary">+ Neue Rechnung</a>
      <button class="btn btn-secondary" id="btn-refresh" type="button" style="display:none;">🔄 Aktualisieren</button>
    </div>
  </div>

  <!-- SP-Fehler-Banner (wird bei Bedarf eingeblendet) -->
  <div id="sp-error-banner" style="display:none;" class="sp-error-banner">
    <span class="sp-error-icon">⚠️</span>
    <div class="sp-error-text">
      <strong id="sp-error-title">SharePoint nicht erreichbar</strong>
      <span id="sp-error-msg"></span>
    </div>
    <button class="sp-error-close" onclick="document.getElementById('sp-error-banner').style.display='none'">✕</button>
  </div>

  <div id="verlauf-container">
    <!-- Initaler Ladeindikator -->
    <div class="verlauf-loading" id="verlauf-loading">
      <span class="spinner"></span>
      <p>SharePoint-Liste wird geladen…</p>
    </div>
  </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Libraries (lokal, kein CDN → kein Tracking-Prevention-Block) -->
<script src="js/vendor/msal-browser.min.js"></script>
<script src="js/vendor/pdf-lib.min.js"></script>

<!-- App Scripts -->
<script src="js/auth.js"></script>
<script src="js/access.js"></script>
<script src="js/zugferd.js"></script>
<script src="js/history.js"></script>
<script src="js/sharepoint.js"></script>

<script>
/* ── Zustand ── */
let _allItems   = [];   // alle geladenen SP-Einträge
let _activeTab  = null; // 'WGC' | 'SHB' | null (= alle)

/* ── Verlauf laden & rendern ── */
async function loadVerlauf(access) {
  showLoading(true);
  try {
    const items = await spGetExports();
    _allItems = items;
    showLoading(false);

    // Tabs aufbauen (nur wenn Zugriff auf mehrere Gesellschaften)
    buildTabs(access);
    applyTabFilter();

    document.getElementById('btn-refresh').style.display   = 'flex';
    document.getElementById('verlauf-subtitle').textContent =
      `${items.length} Einträge aus SharePoint · Liste: IT/ERechnung`;
  } catch (err) {
    showLoading(false);
    showSPError(err);
    // Fallback: localStorage
    document.getElementById('verlauf-subtitle').textContent =
      'SharePoint nicht verfügbar · Lokaler Browser-Cache';
    renderVerlauf(); // history.js (localStorage)
  }

  const refreshBtn = document.getElementById('btn-refresh');
  if (refreshBtn && !refreshBtn.dataset.bound) {
    refreshBtn.dataset.bound = '1';
    refreshBtn.addEventListener('click', () => loadVerlauf(getCurrentUserAccess()));
  }
}

/* ── Tabs bauen ── */
function buildTabs(access) {
  // Alten Tab-Container entfernen falls vorhanden
  const old = document.getElementById('verlauf-tabs');
  if (old) old.remove();

  if (!access || access.length <= 1) {
    // Nur eine Gesellschaft → kein Tab nötig, Filter setzen
    _activeTab = access && access.length === 1 ? access[0].toUpperCase() : null;
    return;
  }

  // Mehrere Gesellschaften → Tabs anzeigen
  _activeTab = access[0].toUpperCase(); // Standard: erste Gesellschaft

  const tabs = document.createElement('div');
  tabs.id = 'verlauf-tabs';
  tabs.className = 'verlauf-tabs';

  // Tab "Alle"
  const allBtn = document.createElement('button');
  allBtn.className = 'verlauf-tab-btn';
  allBtn.textContent = 'Alle';
  allBtn.dataset.tab = 'ALL';
  allBtn.addEventListener('click', () => setTab('ALL', tabs));
  tabs.appendChild(allBtn);

  access.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'verlauf-tab-btn' + (g.toUpperCase() === _activeTab ? ' active' : '');
    btn.textContent = (typeof GESELLSCHAFT_LABELS !== 'undefined' ? GESELLSCHAFT_LABELS[g] : null) || g.toUpperCase();
    btn.dataset.tab = g.toUpperCase();
    btn.addEventListener('click', () => setTab(g.toUpperCase(), tabs));
    tabs.appendChild(btn);
  });

  // Tabs vor dem Container einfügen
  const container = document.getElementById('verlauf-container');
  container.parentNode.insertBefore(tabs, container);
}

function setTab(tab, tabsEl) {
  _activeTab = tab === 'ALL' ? null : tab;
  tabsEl.querySelectorAll('.verlauf-tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  applyTabFilter();
}

/* ── Gefilterte Anzeige ── */
function applyTabFilter() {
  const visible = _activeTab
    ? _allItems.filter(e => (e.gesellschaft || 'WGC').toUpperCase() === _activeTab)
    : _allItems;
  renderSP(visible);
}

function showLoading(on) {
  const el = document.getElementById('verlauf-loading');
  if (el) el.style.display = on ? 'flex' : 'none';
}

function showSPError(err) {
  const banner = document.getElementById('sp-error-banner');
  banner.style.display = 'flex';
  document.getElementById('sp-error-msg').textContent = err.message;

  // Azure-Berechtigungs-Hinweis wenn nötig
  if (err.message?.includes('403') || err.message?.includes('insufficient')) {
    document.getElementById('sp-error-title').textContent =
      'Fehlende Berechtigungen — Adminzustimmung erforderlich';
  }
}

/* ── SharePoint-Tabelle rendern ── */
function renderSP(items) {
  const container = document.getElementById('verlauf-container');
  container.innerHTML = '';

  if (!items.length) {
    container.innerHTML = `
      <div class="verlauf-empty">
        <span class="ve-icon">📂</span>
        <h3>Noch keine Einträge</h3>
        <p>Exportierte Rechnungen erscheinen hier automatisch.</p>
      </div>`;
    return;
  }

  const table = document.createElement('div');
  table.className = 'verlauf-table-wrapper';
  table.innerHTML = `
    <table class="verlauf-table">
      <thead>
        <tr>
          <th>Datum</th>
          <th>Rechnungs-Nr.</th>
          <th>Aussteller</th>
          <th>Empfänger</th>
          <th>Gesellschaft</th>
          <th>Format</th>
          <th class="text-right">Betrag</th>
          <th>Dateien</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${items.map(e => spRow(e)).join('')}
      </tbody>
    </table>`;
  container.appendChild(table);

  // Delete-Buttons verdrahten
  container.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Diesen Eintrag aus SharePoint löschen?')) return;
      btn.textContent = '…';
      btn.disabled = true;
      try {
        await spDeleteItem(btn.dataset.del);
        btn.closest('tr').remove();
        showToast('Eintrag gelöscht.', 'info');
      } catch (err) {
        showToast('Löschen fehlgeschlagen: ' + err.message, 'error');
        btn.textContent = '🗑';
        btn.disabled = false;
      }
    });
  });
}

function spRow(e) {
  const date   = e.createdAt ? new Date(e.createdAt).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '–';
  const betrag = (e.grossTotal || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmt    = e.format || 'XRechnung';
  const fmtCls = fmt.toLowerCase().includes('zugferd') ? 'zugferd' : 'xrechnung';
  const esc    = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const ges    = (e.gesellschaft || '').toUpperCase();
  const gesCls = ges === 'SHB' ? 'shb' : 'wgc';
  const gesBadge = ges ? `<span class="format-tag ${gesCls}">${esc(ges)}</span>` : '–';

  const xmlBtn = e.xmlUrl
    ? `<a href="${esc(e.xmlUrl)}" target="_blank" class="btn btn-secondary btn-sm" title="XML in SharePoint öffnen">📄 XML</a>`
    : '';
  const pdfBtn = e.pdfUrl
    ? `<a href="${esc(e.pdfUrl)}" target="_blank" class="btn btn-secondary btn-sm" title="ZUGFeRD PDF in SharePoint öffnen">📎 PDF</a>`
    : '';

  return `
    <tr>
      <td>${date}</td>
      <td class="invoice-nr">${esc(e.rechnungsnummer)}</td>
      <td>${esc(e.verkaeufer)}</td>
      <td>${esc(e.kaeufer)}</td>
      <td>${gesBadge}</td>
      <td><span class="format-tag ${fmtCls}">${esc(fmt)}</span></td>
      <td class="amount-cell">${betrag} €</td>
      <td><div class="actions-cell">${xmlBtn}${pdfBtn}</div></td>
      <td>
        <button class="btn btn-danger btn-sm" data-del="${esc(e.id)}" title="Löschen">🗑</button>
      </td>
    </tr>`;
}

/* ── Kein Zugriff ── */
function showAccessDenied() {
  showLoading(false);
  const account = getAuthUser();
  const upn = account ? account.username : '–';
  document.getElementById('verlauf-subtitle').textContent = 'Kein Zugriff für diesen Account';
  document.getElementById('verlauf-container').innerHTML = `
    <div class="access-denied-box">
      <div class="access-denied-icon">🔒</div>
      <h3>Kein Zugriff</h3>
      <p>Ihr Account <strong>${upn}</strong> ist nicht für den Exportverlauf freigeschaltet.</p>
      <p>Bitte wenden Sie sich an Ihren Administrator, um Zugriff zu erhalten.</p>
    </div>`;
}

/* ── Toast ── */
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('fade-out');
    toast.addEventListener('animationend', () => toast.remove());
  }, 4000);
}
</script>

<!-- Alle Funktionen sind jetzt definiert → Auth starten -->
<script>
onAuthReady(async () => {
  await loadRuntimeAccessConfig();
  initAdminNav();
  const access = getCurrentUserAccess();
  if (access.length === 0) {
    showAccessDenied();
  } else {
    loadVerlauf(access);
  }
});
</script>
<script>authInit();</script>

</body>
</html>
